name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libxcb1-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            imagemagick
          echo "Checking available WebKit/JavaScriptCore/Libsoup packages"
          # Install whichever WebKit/JSCore/libsoup dev packages are available on this distro
          WEBKIT_PKGS=(libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev)
          for p in "${WEBKIT_PKGS[@]}"; do
            if apt-cache show "$p" >/dev/null 2>&1; then
              sudo apt-get install -y "$p"
              break
            fi
          done

          JSCORE_PKGS=(libjavascriptcoregtk-4.1-dev libjavascriptcoregtk-4.0-dev)
          for p in "${JSCORE_PKGS[@]}"; do
            if apt-cache show "$p" >/dev/null 2>&1; then
              sudo apt-get install -y "$p"
              break
            fi
          done

          SOUP_PKGS=(libsoup-3.0-dev libsoup2.4-dev)
          for p in "${SOUP_PKGS[@]}"; do
            if apt-cache show "$p" >/dev/null 2>&1; then
              sudo apt-get install -y "$p"
            fi
          done

          GIR_WEBKITS=(gir1.2-webkit2-4.1 gir1.2-webkit2-4.0)
          for p in "${GIR_WEBKITS[@]}"; do
            if apt-cache show "$p" >/dev/null 2>&1; then
              sudo apt-get install -y "$p"
            fi
          done

          GIR_JS=(gir1.2-javascriptcoregtk-4.1 gir1.2-javascriptcoregtk-4.0)
          for p in "${GIR_JS[@]}"; do
            if apt-cache show "$p" >/dev/null 2>&1; then
              sudo apt-get install -y "$p"
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run JS unit tests
        run: npm test

      - name: Ensure Tauri icon exists for CI
        run: |
          mkdir -p src-tauri/icons
          if command -v convert >/dev/null 2>&1; then
            convert -size 1x1 xc:transparent src-tauri/icons/icon.png
          else
            echo iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII= | base64 -d > src-tauri/icons/icon.png
          fi

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E
        run: npm run e2e
        env:
          CI: true
 
