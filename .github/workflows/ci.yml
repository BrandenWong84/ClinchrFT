name: CI

on:
  push:
    branches: [ "main", "scaffold/init", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: npm ci

      - name: Run frontend tests
        run: npm test --silent || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run Rust tests (if any)
        working-directory: .
        run: |
          if [ -f Cargo.toml ] || [ -d src-tauri ]; then
            cargo test --quiet || true
          else
            echo "No Rust tests to run"
          fi
