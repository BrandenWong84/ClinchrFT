name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  install:
    runs-on: windows-latest
    outputs:
      node-version: 18
    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch --no-tags --prune --depth=1 origin ${{ github.sha }}
          git checkout -f ${{ github.sha }}
      - name: Verify Node
        shell: pwsh
        run: node --version || true
      - name: Install deps
        run: npm ci

  check-api-contracts:
    runs-on: windows-latest
    needs: install
    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch --no-tags --prune --depth=1 origin ${{ github.sha }}
          git checkout -f ${{ github.sha }}
      - name: Verify Node
        shell: pwsh
        run: node --version || true
      - name: Install deps
        run: npm ci
      - name: Run API contracts check
        run: npm run check:api-contracts

  allowlist-check:
    runs-on: windows-latest
    needs: install
    continue-on-error: false
    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch --no-tags --prune --depth=1 origin ${{ github.sha }}
          git checkout -f ${{ github.sha }}
      - name: Verify Node
        shell: pwsh
        run: node --version || true
      - name: Install deps
        run: npm ci
      - name: Run allowlist checker
        run: node scripts/tauri-allowlist-checker.cjs
      - name: Upload allowlist report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allowlist-report
          path: allowlist-report.json
