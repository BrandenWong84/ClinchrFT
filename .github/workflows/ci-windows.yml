name: CI Windows

on:
  push:
    branches: [ "main", "scaffold/init", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch --no-tags --prune --depth=1 origin ${{ github.sha }}
          git checkout -f ${{ github.sha }}

      - name: Verify Node.js
        shell: pwsh
        run: node --version || true

      - name: Install frontend deps
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run Rust tests (if any)
        working-directory: .
        shell: bash
        run: |
          if [ -f Cargo.toml ] || [ -d src-tauri ]; then
            cargo test --quiet || true
          else
            echo "No Rust tests to run"
          fi
      - name: Run allowlist checker
        run: node scripts/tauri-allowlist-checker.cjs
